spring:
  application:
    name: jacob
  datasource:
    url: jdbc:postgresql://localhost:5432/jacob
    username: jacob
    password: jacob
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        format_sql: true
ollama:
  base-url: http://localhost:11434
  model-name: llama3.2:3b
  embedding-model: nomic-embed-text

rag:
  chunk-size: 500
  chunk-overlap: 100
  max-results: 5
  min-score: 0.7
  # documents-path: /Users/davidperrai/Documents/Projets/bookingMcp/booking-llm-backend/ragdocuments
  # embeddings-store-path: /Users/davidperrai/Documents/Projets/bookingMcp/booking-llm-backend/embeddings-store.json

logging:
  level:
    dev.langchain4j: DEBUG
    dev.langchain4j.impl: DEBUG
    dev.langchain4j.agent: DEBUG
    dev.langchain4j.model: DEBUG
    dev.langchain4j.service: DEBUG
